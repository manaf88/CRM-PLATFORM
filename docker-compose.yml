services:
  postgres:
    image: postgres:16
    container_name: growth_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: growth_platform
      POSTGRES_USER: growth_user
      POSTGRES_PASSWORD: growth_password
    ports:
      - "5432:5432"
    volumes:
      - growth_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: growth_redis
    restart: unless-stopped
    ports:
      - "6379:6379"


  minio:
    image: minio/minio
    container_name: growth_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - growth_minio_data:/data

  adminer:
    image: adminer
    container_name: growth_adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - postgres

volumes:
  growth_postgres_data:
  growth_minio_data: